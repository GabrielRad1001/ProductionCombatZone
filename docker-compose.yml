version: '3.8'

# Combat Zone Moisei - Docker Compose Configuration
# Environment variables are loaded from backend/.env file
# To deploy: docker-compose up -d --build

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: combat-zone-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: combat_zone_db
    ports:
      - "127.0.0.1:27514:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - combat-zone-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/combat_zone_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: combat-zone-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18392:8001"
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - combat-zone-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://combatzonemoisei.ro
    container_name: combat-zone-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:15847:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - combat-zone-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  combat-zone-network:
    driver: bridge
    name: combat-zone-network

volumes:
  mongodb_data:
    name: combat-zone-mongodb-data
  mongodb_config:
    name: combat-zone-mongodb-config
